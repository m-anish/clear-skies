<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#09090f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Clear Skies"><!-- patched by app.js -->
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Clear Skies</title><!-- patched by app.js -->
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<canvas id="stars-canvas"></canvas>
<nav id="topnav"></nav>
<div id="subnav"></div>
<button id="hint-prev" aria-label="Previous slide">&#8592;</button>
<button id="hint-next" aria-label="Next slide">&#8594;</button>
<button id="nightmode-bubble" aria-label="Toggle red-shift mode"><span class="nb-icon">&#x2600;&#xFE0E;</span></button>
<div id="slide-track"></div>
<div id="swipe-dots"></div>
<div id="progress"></div>
<div id="counter"></div>
<div id="update-toast" role="button" aria-label="New edition available — tap to update">New edition available — tap to update</div>

<!-- Load order: loader (injects correct data file) → sketches → constellations → quotes → objects → log → app -->
<script src="./loader.js"></script>
<script src="./sketches.js"></script>
<script src="./constellations.js"></script>
<script src="./quotes.js"></script>
<script src="./objects-db.js"></script>
<script src="./log.js"></script>
  <script src="./log-ui.js"></script>
  <script src="./print-link.js"></script>
  <script src="./app.js"></script>
</body>
</html>
